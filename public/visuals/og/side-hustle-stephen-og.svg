  <text x="122" y="250" fill="#07101f" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="800" letter-spacing="0">
    <tspan x="122" dy="0">Start a simple</tspan>
    <tspan x="122" dy="78">business today.</tspan>
