  <circle cx="150" cy="525" r="230" fill="#2eb67d" opacity="0.14"/>
  <rect x="82" y="72" width="1036" height="486" rx="44" fill="url(#panel)" stroke="#fff" stroke-width="2" filter="url(#shadow)"/>
  <rect x="122" y="118" width="304" height="48" rx="24" fill="#07101f" opacity="0.92"/>
